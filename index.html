<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Authentication UI</title>

    <!-- CSS -->
    <link rel="stylesheet" href="index.css">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>


<div class="container">
    <div class="auth-card">

        <!-- Tabs -->
        <div class="tabs">
            <button type="button" id="loginTab" class="active">Login</button>
            <button type="button" id="registerTab">Register</button>
        </div>

        <!-- LOGIN FORM -->
        <form id="loginForm">

            <h2>Welcome Back</h2>

            <div class="input-group">
                <input type="email" id="loginEmail" placeholder="Email Address" required>
                <small class="error"></small>
            </div>

            <div class="input-group">
                <input type="password" id="loginPassword" placeholder="Password" required>
                <i class="fa-solid fa-eye toggle-password"></i>
                <small class="error"></small>
            </div>

            <div class="options">
                <label>
                    <input type="checkbox">
                    Remember Me
                </label>

                <a href="#">Forgot Password?</a>
            </div>

            <button type="submit" class="btn">
                <span class="btn-text">Login</span>
                <span class="loader hidden"></span>
            </button>

            <div class="divider">OR</div>

            <div class="social-login">
                <button type="button"><i class="fab fa-google"></i></button>
                <button type="button"><i class="fab fa-github"></i></button>
                <button type="button"><i class="fab fa-facebook"></i></button>
                <button type="button"><i class="fab fa-linkedin"></i></button>
            </div>

        </form>

        <!-- REGISTER FORM -->
        <form id="registerForm" class="hidden">

            <h2>Create Account</h2>

            <div class="input-group">
                <input type="text" id="fullName" placeholder="Full Name" required>
                <small class="error"></small>
            </div>

            <div class="input-group">
                <input type="email" id="registerEmail" placeholder="Email Address" required>
                <small class="error"></small>
            </div>

            <div class="input-group">
                <input type="password" id="registerPassword" placeholder="Password" required>
                <i class="fa-solid fa-eye toggle-password"></i>
                <small class="error"></small>
            </div>

            <div class="input-group">
                <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
                <i class="fa-solid fa-eye toggle-password"></i>
                <small class="error"></small>
            </div>

            <div class="terms">
                <label>
                    <input type="checkbox" id="terms" required>
                    Accept Terms &amp; Conditions
                </label>
            </div>

            <button type="submit" class="btn">
                Register
            </button>

            <div class="divider">OR</div>

            <div class="social-login">
                <button type="button"><i class="fab fa-google"></i></button>
                <button type="button"><i class="fab fa-facebook"></i></button>
                <button type="button"><i class="fab fa-linkedin"></i></button>
            </div>

        </form>

        <!-- Message -->
        <div id="message"></div>

    </div>
</div>

<!-- JavaScript -->
<script src="index.js"></script>

</body>
</html>
